<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="description" content="Checkout page for RiverSolJax orders"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<meta property="og:type" content="website">
<meta property="og:image" content="https://jossuarivera.github.io/RiverSolJax-web1-final-test/images/RIVERSOLJAX_logo.png">
<meta property="og:url" content="https://jossuarivera.github.io/RiverSolJax-web1-final-test/">

<link rel="stylesheet" href="checkout_style.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

<title>RiverSolJax - Checkout</title>
</head>

<body>

<header>
<nav class="navigation_bar">
<a href="index.html">
<img src="images/RIVERSOLJAX-WEB_PAGE_logo.png" alt="RiverSolJax logo"/>
</a>
</nav>
</header>

<main class="checkout_main">

<div class="checkout_header">
<img src="images/RIVERSOLJAX_logo.png" alt="RiverSolJax logo"/>
<h1>Checkout</h1>
</div>

<div id="pickupDeliveryModal" class="modal">
<div class="modal-content">
<h2>Pick Up or Delivery</h2>
<button id="pickupBtn">Pick Up</button>
<button id="deliveryBtn">Delivery <br> Only Sundays</button>
</div>
</div>

<form id="checkoutForm" class="checkout_form">

<div id="mapContainer"></div>

<div class="form-fields">

<label for="cName">Name:</label>
<input type="text" id="cName" required autocomplete="name"/>

<label for="cEmail">Email:</label>
<input type="email" id="cEmail" required autocomplete="email"/>

<label for="cPhone">Phone:</label>
<input type="tel" id="cPhone" required autocomplete="tel"/>

<div id="addressContainer">
  <label for="cStreet">Street Address:</label>
  <input type="text" id="cStreet" required autocomplete="street-address"/>

  <label for="cCity">City:</label>
  <input type="text" id="cCity" required autocomplete="address-level2"/>

  <label for="cState">State:</label>
  <input type="text" id="cState" required autocomplete="address-level1"/>

  <label for="cZip">ZIP Code:</label>
  <input type="text" id="cZip" required pattern="\d{5}" title="5-digit ZIP code" autocomplete="postal-code"/>

  <label for="cNotes">Additional Info (Gate code, instructions, etc.):</label>
  <textarea id="cNotes" placeholder="Optional: Anything important for delivery" rows="3"></textarea>

  <div id="deliveryTimeContainer">
    <label for="deliveryTime">Delivery Time (Sunday Only):</label>
    <select id="deliveryTime" required>
      <option value="" disabled selected hidden>Select Delivery Time</option>
      <option>10:00 AM</option>
      <option>10:30 AM</option>
      <option>11:00 AM</option>
      <option>11:30 AM</option>
      <option>12:00 PM</option>
      <option>12:30 PM</option>
      <option>1:00 PM</option>
      <option>1:30 PM</option>
      <option>2:00 PM</option>
      <option>2:30 PM</option>
      <option>3:00 PM</option>
    </select>
  </div>
</div>

<div id="receipt"></div>

<button type="submit" id="payNowBtn">Pay Now</button>

<div class="contact_info">

<h3 class="contact_title">Contact Us for any questions</h3>

<div class="contact_icons">
<a href="mailto:customerservice@riversoljax.com"><i class="fa fa-envelope"></i></a>
<a href="tel:9047169007"><i class="fa fa-phone"></i></a>
<a href="https://www.instagram.com/riversoljax/" target="_blank"><i class="fa fa-instagram"></i></a>
</div>

</div>
</form>

<script src="checkout_script.js"></script>
<script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&libraries=places&callback=initAutocomplete" async defer></script>
</body>
</html>
